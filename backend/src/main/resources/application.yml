spring:
  datasource:
    # Ưu tiên DB_URL nếu được set; nếu không thì ghép từ host/port/name (tiện cho Render).
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:distribution_db}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
  flyway:
    enabled: true
    out-of-order: true        # Cho phép V4, V5 chạy dù bị skip trước đó
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate      # Đổi từ update → validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: ${PORT:8080}
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:distribution-logistics-jwt-secret-key-2024-very-secure}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000